<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AAC Communicator</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
    <script src="script/auth.js"></script>
    <script src="script/config.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-content">
            <h3>Accesso Utente</h3>
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" placeholder="Inserisci il tuo username" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Inserisci la tua password" autocomplete="current-password">
            </div>
            <div class="modal-buttons">
                <button class="btn-primary" id="loginBtn">Accedi</button>
            </div>
            <div class="register-link">
                <p>Non hai un account? <a href="/register.html">Registrati</a></p>
            </div>
        </div>
    </div>
</body>
</html>
