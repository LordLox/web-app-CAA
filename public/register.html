<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione - AAC Communicator</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
    <script src="script/auth.js"></script>
    <script src="script/config.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-content">
            <h3>Crea un nuovo account</h3>
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" placeholder="Scegli un username" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Crea una password" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="editorPassword">Editor Password:</label>
                <input type="password" id="editorPassword" placeholder="Crea una password per la modalità editor" autocomplete="new-password">
            </div>
            <div class="modal-buttons">
                <button class="btn-primary" id="registerBtn">Registrati</button>
            </div>
            <div class="register-link">
                <p>Hai già un account? <a href="/login.html">Accedi</a></p>
            </div>
        </div>
    </div>
</body>
</html>
