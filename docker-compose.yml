services:
  backend:
    image: ghcr.io/sonia-bia/web-app-caa/backend:latest
    hostname: backend
    build:
      context: .
      dockerfile: backend.Dockerfile
    env_file: .env
    expose:
      - 5000
    restart: unless-stopped

  frontend:
    image: ghcr.io/sonia-bia/web-app-caa/frontend:latest
    hostname: frontend
    build:
      context: .
      dockerfile: frontend.Dockerfile
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
